name: Release duckdb-fractalsql Packages

# Tag-triggered: pushing vX.Y.Z builds every (duckdb_version, platform)
# cell, smoke-tests linux_amd64 per version, and uploads all artifacts
# to the GitHub Release.
#
# If a fix lands AFTER the tag was cut, force-push the tag to the new
# commit — CI rebuilds from the tag's SHA, not the branch head.
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------
  # Linux: matrix over (duckdb_version) × (amd64, arm64). QEMU+Buildx
  # for arm64. Smoke test runs on amd64 only — getting matching duckdb
  # CLIs to work under QEMU is flaky and the link-step assertions
  # already validate the arm64 ABI.
  # --------------------------------------------------------------------
  linux:
    name: linux ${{ matrix.arch }} @ ${{ matrix.duckdb_version }}
    # Native arm64 via GitHub's ubuntu-24.04-arm runner. Earlier
    # iterations used ubuntu-latest + QEMU, which turned a ~20-30 min
    # DuckDB compile into 90+ min because every instruction paid the
    # cost of x86->aarch64 translation. Native arm64 runners have been
    # GA since 2025 and run the same Docker + buildx stack.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        duckdb_version: [v1.2.2, v1.4.4, v1.5.2]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip curl

      - name: Build fractalsql.duckdb_extension
        env:
          # Scope per (version, arch) so cells don't clobber each
          # other's BuildKit cache. Native runners on both arches, so
          # cold builds are ~20-30 min each; subsequent runs warm-hit.
          BUILDX_CACHE_ARGS: >-
            --cache-from=type=gha,scope=duckdb-fractalsql-${{ matrix.duckdb_version }}-${{ matrix.arch }}
            --cache-to=type=gha,scope=duckdb-fractalsql-${{ matrix.duckdb_version }}-${{ matrix.arch }},mode=max
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}

      # Smoke-test only on native amd64. We download the matching
      # duckdb CLI for this DuckDB version, LOAD the extension, and
      # run the convergence + vectorized-execution assertions in
      # test/smoke_test.sql.
      #
      # -unsigned is mandatory: Community extensions aren't signed
      # and DuckDB 1.1+ rejects SET allow_unsigned_extensions=true
      # after the DB is open.
      - name: Smoke test in DuckDB CLI
        if: matrix.arch == 'amd64'
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: |
          set -euo pipefail

          curl -fsSL \
            "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" \
            -o /tmp/duckdb_cli.zip
          unzip -p /tmp/duckdb_cli.zip duckdb > /tmp/duckdb
          chmod +x /tmp/duckdb
          /tmp/duckdb --version

          EXT_PATH="$(pwd)/dist/amd64/fractalsql.${DUCKDB_VERSION}.linux_amd64.duckdb_extension"
          test -f "${EXT_PATH}"

          # Bisect the crash: run minimal probes in sequence so we
          # know exactly which statement triggers the abort. Each
          # invocation is its own process — a crash in one doesn't
          # affect subsequent probes.
          probe () {
              local label="$1"; shift
              echo "--- probe: ${label} ---"
              { echo "LOAD '${EXT_PATH}';"; echo "$*"; } \
                  | /tmp/duckdb -bail -unsigned \
                  || { echo "!!! probe '${label}' failed"; exit 1; }
              echo "ok: ${label}"
          }

          probe "load-only"        "SELECT 1;"
          probe "edition"          "SELECT fractalsql_edition();"
          probe "version"          "SELECT fractalsql_version();"
          probe "functions-visible" \
              "SELECT function_name FROM duckdb_functions() WHERE function_name LIKE 'fractal%';"
          probe "fractal-search-scalar" \
              "SELECT fractal_search([0.6, 0.8]::DOUBLE[], [0.6, 0.8]::DOUBLE[]);"

          # Full smoke test last — if earlier probes pass, this tells
          # us whether the crash is in the vectorized-execution path.
          probe "full-smoke-test"  "$(cat test/smoke_test.sql)"
          echo "smoke test passed on DuckDB ${DUCKDB_VERSION}"

      - name: Package artifacts
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: |
          chmod +x scripts/package.sh
          scripts/package.sh ${{ matrix.arch }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-fractalsql-${{ matrix.duckdb_version }}-linux_${{ matrix.arch }}
          path: dist/packages/*
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------
  # macOS: native GitHub runners for Intel (macos-13) and Apple
  # Silicon (macos-14). DuckDB ships native headers for both arches;
  # no cross-compile. No smoke test here — the link-step assertions
  # validate the ABI and matching-arch duckdb CLIs on GH runners add
  # flake without coverage.
  # --------------------------------------------------------------------
  macos:
    name: macos ${{ matrix.platform_tag }} @ ${{ matrix.duckdb_version }}
    strategy:
      fail-fast: false
      matrix:
        duckdb_version: [v1.2.2, v1.4.4, v1.5.2]
        include:
          - runner: macos-13
            platform_tag: osx_amd64
            duckdb_platform: osx_amd64
          - runner: macos-14
            platform_tag: osx_arm64
            duckdb_platform: osx_arm64
    runs-on: ${{ matrix.runner }}
    # LuaJIT's Makefile hard-requires MACOSX_DEPLOYMENT_TARGET in the
    # environment on Darwin (src/Makefile bails with "missing: export
    # MACOSX_DEPLOYMENT_TARGET=XX.YY"). 11.0 is the oldest target
    # supporting both Intel and Apple Silicon; pick it so the same
    # pin works on macos-13 and macos-14 runners. Set at job scope so
    # both the LuaJIT build and DuckDB/extension build see it.
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          set -euo pipefail
          brew install cmake ninja ccache git || true

      - name: Build LuaJIT static
        run: |
          set -euo pipefail
          git clone --depth=1 --branch v2.1 \
              https://github.com/LuaJIT/LuaJIT.git /tmp/luajit
          ( cd /tmp/luajit
            unset TARGET_ARCH
            make BUILDMODE=static XCFLAGS="-fPIC" \
                 PREFIX=/tmp/luajit-install \
                 -j$(sysctl -n hw.ncpu) TARGET_ARCH=
            make install BUILDMODE=static PREFIX=/tmp/luajit-install )
          test -f /tmp/luajit-install/lib/libluajit-5.1.a

      - name: Build fractalsql.duckdb_extension
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: |
          set -euo pipefail
          cmake -S . -B build-macos -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_ARCH=$([ "${{ matrix.platform_tag }}" = "osx_arm64" ] && echo arm64 || echo amd64) \
              -DDUCKDB_VERSION=${DUCKDB_VERSION} \
              -DDUCKDB_PLATFORM=${{ matrix.duckdb_platform }} \
              -DLUAJIT_STATIC_LIB_PATH=/tmp/luajit-install/lib/libluajit-5.1.a \
              -DLUAJIT_INCLUDE_DIR=/tmp/luajit-install/include/luajit-2.1
          cmake --build build-macos -j$(sysctl -n hw.ncpu) --target fractalsql_extension

          OUT_DIR="dist/${{ matrix.platform_tag }}"
          OUT_NAME="fractalsql.${DUCKDB_VERSION}.${{ matrix.platform_tag }}.duckdb_extension"
          mkdir -p "${OUT_DIR}"
          cp build-macos/fractalsql.duckdb_extension "${OUT_DIR}/${OUT_NAME}"
          ls -l "${OUT_DIR}/${OUT_NAME}"
          otool -L "${OUT_DIR}/${OUT_NAME}" || true

      - name: Package .zip
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: |
          set -euo pipefail
          VERSION="1.0.0"
          DIST_DIR="dist/packages"
          mkdir -p "${DIST_DIR}"
          EXT_NAME="fractalsql.${DUCKDB_VERSION}.${{ matrix.platform_tag }}.duckdb_extension"
          SRC="dist/${{ matrix.platform_tag }}/${EXT_NAME}"
          cp "${SRC}" "${DIST_DIR}/${EXT_NAME}"

          STAGE="$(mktemp -d)"
          cp "${SRC}"                 "${STAGE}/${EXT_NAME}"
          cp LICENSE                  "${STAGE}/LICENSE"
          cp THIRD-PARTY-NOTICES.md   "${STAGE}/LICENSE-THIRD-PARTY"
          cp sql/load_extension.sql   "${STAGE}/load_extension.sql"
          cat > "${STAGE}/README.txt" <<EOF
          duckdb-fractalsql ${VERSION} Community (${DUCKDB_VERSION} / ${{ matrix.platform_tag }})
          Load: duckdb -unsigned -cmd "LOAD '\$(pwd)/${EXT_NAME}';"
          EOF
          ( cd "${STAGE}" && zip -9 -r "${OLDPWD}/${DIST_DIR}/duckdb-fractalsql-${DUCKDB_VERSION}-${{ matrix.platform_tag }}.zip" . > /dev/null )
          rm -rf "${STAGE}"
          ls -l "${DIST_DIR}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-fractalsql-${{ matrix.duckdb_version }}-${{ matrix.platform_tag }}
          path: dist/packages/*
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------
  # Windows x64. windows_arm64 is skipped: DuckDB doesn't publish a
  # matching Windows ARM64 CLI binary in upstream releases, so
  # downstream users couldn't load our extension anyway.
  # --------------------------------------------------------------------
  windows:
    name: windows_amd64 @ ${{ matrix.duckdb_version }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        duckdb_version: [v1.2.2, v1.4.4, v1.5.2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install -y ninja

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build LuaJIT static
        shell: cmd
        run: |
          git clone --depth=1 --branch v2.1 https://github.com/LuaJIT/LuaJIT.git C:\deps\LuaJIT || exit /b 1
          REM cmd.exe's `cd <other-drive>:\...` stores the cwd for that
          REM drive but does NOT switch drives. `cd /D` is the cross-
          REM drive form. GitHub runners start this job on D:\ so a
          REM plain `cd C:\...` silently leaves us on D:\ — then
          REM msvcbuild.bat can't be found.
          cd /D C:\deps\LuaJIT\src || exit /b 1
          call msvcbuild.bat static || exit /b 1
          dir lua51.lib

      - name: Build fractalsql.duckdb_extension
        shell: cmd
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
          LUAJIT_DIR: C:\deps\LuaJIT\src
        run: |
          call scripts\windows\build.bat

      - name: Package .zip
        shell: pwsh
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: |
          $ErrorActionPreference = "Stop"
          $VERSION = "1.0.0"
          $DIST_DIR = "dist/packages"
          New-Item -ItemType Directory -Force -Path $DIST_DIR | Out-Null
          $EXT_NAME = "fractalsql.$env:DUCKDB_VERSION.windows_amd64.duckdb_extension"
          $SRC = "dist/windows_amd64/$EXT_NAME"
          if (!(Test-Path $SRC)) { throw "missing $SRC" }
          Copy-Item $SRC "$DIST_DIR/$EXT_NAME"

          # Stage then zip via PowerShell's Compress-Archive. zip.exe
          # is not present on GitHub windows-2022 runners' git-bash.
          $STAGE = New-Item -ItemType Directory -Path ([System.IO.Path]::GetTempFileName() + ".d")
          Copy-Item $SRC                        "$STAGE/$EXT_NAME"
          Copy-Item LICENSE                     "$STAGE/LICENSE"
          Copy-Item THIRD-PARTY-NOTICES.md      "$STAGE/LICENSE-THIRD-PARTY"
          Copy-Item sql/load_extension.sql      "$STAGE/load_extension.sql"
          @"
          duckdb-fractalsql $VERSION Community ($env:DUCKDB_VERSION / windows_amd64)
          Load: duckdb.exe -unsigned -cmd "LOAD '%cd%\$EXT_NAME';"
          "@ | Set-Content "$STAGE/README.txt" -Encoding utf8
          $ZIP = "$DIST_DIR/duckdb-fractalsql-$env:DUCKDB_VERSION-windows_amd64.zip"
          Compress-Archive -Path "$STAGE/*" -DestinationPath $ZIP -Force
          Remove-Item -Recurse -Force $STAGE
          Get-ChildItem $DIST_DIR

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-fractalsql-${{ matrix.duckdb_version }}-windows_amd64
          path: dist/packages/*
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
